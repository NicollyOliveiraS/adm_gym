<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - GreenFit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="img/gf.png" alt="GreenFit Logo" height="100">
            </div>
            <div id="userInfo" class="user-info hidden">
                <button id="btnLogout" class="btn-exit">SAIR</button>
            </div>
        </div>
    </nav>

    <main class="main-container">
        <section id="loginSection" class="catraca login-box">
            <p>ACESSO RESTRITO</p>
            <h2>Identifique-se para continuar</h2>
            <form id="loginForm" class="admin-form">
                <div class="display-cpf">
                    <input type="text" id="usuario" placeholder="USUÁRIO" required>
                </div>
                <div class="display-cpf password-container" style="display: flex; align-items: center; justify-content: space-between;">
                    <input type="password" id="password" placeholder="SENHA" required style="flex: 1;">
                    <span id="togglePassword" class="toggle-icon" style="cursor: pointer; padding-left: 10px;">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </span>
                </div>
                <button type="submit" class="btn-ok">ENTRAR</button>
                <div id="loginError" class="error-msg hidden">ACESSO NEGADO</div>
            </form>
        </section>

        <div id="adminSection" class="admin-content hidden">
            <div class="stats-row">
                <div class="catraca stat-card">
                    <p>TOTAL CADASTROS</p>
                    <div id="totalCadastros">0</div>
                </div>
            </div>

            <div class="dashboard-grid">
                <aside class="form-side">
                    <div class="catraca">
                        <p id="formTitle">NOVO CADASTRO</p>
                        <form id="cadastroForm" class="admin-form">
                            <input type="hidden" id="cadastroId">
                            
                            <div class="form-group">
                                <label>NOME COMPLETO</label>
                                <div class="display-cpf">
                                    <input type="text" id="nome" placeholder="Apenas letras" 
                                           pattern="[A-Za-zÀ-ÿ\s]+" title="O nome deve conter apenas letras." required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>CPF (11 NÚMEROS)</label>
                                <div class="display-cpf">
                                    <input type="text" id="cpf" placeholder="00000000000" 
                                           maxlength="11" pattern="\d{11}" title="O CPF deve ter exatamente 11 números." required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>STATUS</label>
                                <div class="display-cpf">
                                    <select id="status" style="background: transparent; border: none; color: var(--primary-color); width: 100%; outline: none; text-align: center; cursor: pointer;">
                                        <option value="Ativo" style="background: #111;">Ativo</option>
                                        <option value="Inativo" style="background: #111;">Inativo</option>
                                        <option value="Pendente" style="background: #111;" selected>Pendente</option>
                                    </select>
                                </div>
                            </div>

                            <div class="btn-group">
                                <button type="submit" class="btn-ok" style="width: 100%;">SALVAR</button>
                                <button type="button" id="btnCancelar" class="btn-cancel hidden">CANCELAR EDIÇÃO</button>
                            </div>
                        </form>
                    </div>
                </aside>

                <section class="list-side">
                    <div class="catraca table-container">
                        <div class="table-header">
                            <p>GERENCIAR</p>
                            <button onclick="carregarCadastros()" class="btn-refresh" style="background: none; color: var(--primary-color); font-size: 1.2rem;">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </div>

                        <table class="admin-table">
                            <thead>
                                <tr>
                                    
                                    <th>NOME</th>
                                    <th>CPF</th>
                                    <th>STATUS</th>
                                    <th style="text-align: right;">AÇÕES</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaCadastros">
                                </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="admin.js"></script>
</body>
</html>
